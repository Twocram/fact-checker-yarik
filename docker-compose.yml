name: fact-checker-yarik

services:
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/bot/.env
    expose:
      - '3000'

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - bot
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
