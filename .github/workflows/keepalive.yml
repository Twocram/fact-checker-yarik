name: Keep Render awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot server
        run: curl --fail --silent --show-error "$KEEPALIVE_URL"
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
